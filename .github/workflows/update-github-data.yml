name: Update GitHub Data

on:
  push:
    branches: [main]
  schedule:
    # Run every day at 6:00 UTC
    - cron: '0 6 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-data:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Fetch GitHub data
        run: node fetch-github-data.js
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add assets/data/github-data.json
          git diff --staged --quiet || (git commit -m "chore: auto-update GitHub data [skip ci]" && git push)
